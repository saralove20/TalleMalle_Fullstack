name: fullstack deployment

on:
  push:
    branches: [main]
jobs:
  deply:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - name : run ssh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo test > /tmp/test
