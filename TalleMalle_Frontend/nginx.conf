server {
    listen 80;

    # 1. 프론트엔드 정적 파일 서빙
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 프록시 설정 (이 부분이 추가되어야 합니다)
        location /api/ {
            # 프록시 패스: 뒤에 /를 붙여서 /api를 떼고 전달합니다.
            proxy_pass http://tallemalle-backend-service:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    # [추가] WebSocket 전용 설정
        location /ws {
            proxy_pass http://tallemalle-backend-service:8080/ws; # 백엔드의 소켓 엔드포인트
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;    # 필수: WebSocket 연결을 위한 업그레이드 헤더
            proxy_set_header Connection "Upgrade";    # 필수
            proxy_set_header Host $host;

            # 연결 유지 시간 설정 (선택 사항)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
}